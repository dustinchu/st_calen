<button class="w-full h-14 bg-primary text-on-primary font-headline-md rounded-2xl shadow-xl shadow-primary/20 active:scale-95 transition-transform flex items-center justify-center gap-2 group" id="next-btn">
<span id="btn-text">下一步</span>
<span class="material-symbols-outlined group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>

<script>
        const slider = document.getElementById('onboarding-slider');
        const dots = [
            document.getElementById('dot-0'),
            document.getElementById('dot-1'),
            document.getElementById('dot-2')
        ];
        const btnText = document.getElementById('btn-text');
        const nextBtn = document.getElementById('next-btn');

        slider.addEventListener('scroll', () => {
            const index = Math.round(slider.scrollLeft / slider.offsetWidth);
            
            dots.forEach((dot, i) => {
                if(i === index) {
                    dot.classList.add('active');
                } else {
                    dot.classList.remove('active');
                }
            });

            if(index === 2) {
                btnText.innerText = '開始使用';
            } else {
                btnText.innerText = '下一步';
            }
        });

        nextBtn.addEventListener('click', () => {
            const index = Math.round(slider.scrollLeft / slider.offsetWidth);
            if(index < 2) {
                slider.scrollTo({
                    left: slider.offsetWidth * (index + 1),
                    behavior: 'smooth'
                });
            } else {
                // Final Action Logic
                nextBtn.classList.add('scale-90');
                setTimeout(() => {
                    alert('歡迎加入股市行事曆！');
                    nextBtn.classList.remove('scale-90');
                }, 200);
            }
        });
    </script>

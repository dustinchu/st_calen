name: stock_calendar
description: Stock Calendar v2 — prediction notebook + share images.
publish_to: "none"

version: 2.0.0+10

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.41.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State / architecture
  hooks_riverpod: ^2.5.1
  flutter_hooks: ^0.20.5
  riverpod_annotation: ^2.3.5

  # Routing
  go_router: ^14.0.0

  # Models / serialization
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.0

  # Networking
  dio: ^5.4.0

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_messaging: ^15.1.3
  firebase_analytics: ^11.3.3
  firebase_crashlytics: ^4.1.3

  # Auth
  google_sign_in: ^6.2.0
  sign_in_with_apple: ^6.1.0

  # Ads
  google_mobile_ads: ^5.1.0

  # Charts
  fl_chart: ^0.68.0

  # Image / share
  share_plus: ^12.0.2
  gal: ^2.3.0
  permission_handler: ^11.3.1

  # Notifications
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4

  # Calendar widget
  table_calendar: ^3.1.2

  # Utils
  intl: ^0.19.0
  uuid: ^4.4.0
  device_info_plus: ^10.1.2
  package_info_plus: ^8.0.2
  url_launcher: ^6.3.0
  app_tracking_transparency: ^2.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.0
  freezed: ^2.5.0
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  hive_generator: ^2.0.1
  mocktail: ^1.0.4
  fake_cloud_firestore: ^3.0.3
  flutter_launcher_icons: ^0.13.0
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/calendar_1.jpg
    - assets/img_black.png
    - assets/img_def.png

flutter_native_splash:
  color: "#FFFFFF"
  color_dark: "#121212"
  android_12:
    color: "#FFFFFF"
    color_dark: "#121212"
  android: true
  ios: true
  web: false

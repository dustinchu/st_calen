<script>
        // Micro-interaction for slider update
        const slider = document.querySelector('input[type="range"]');
        const numInput = document.querySelector('input[type="number"]');
        const displayVal = document.querySelector('.text-display-bold');

        slider.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            const formatted = (val > 0 ? '+' : '') + val.toFixed(1);
            displayVal.textContent = formatted;
            numInput.value = val;
            
            // Color shift logic
            if(val > 0) {
                displayVal.className = 'text-display-bold font-display-bold text-tertiary transition-colors';
            } else if(val < 0) {
                displayVal.className = 'text-display-bold font-display-bold text-error transition-colors';
            } else {
                displayVal.className = 'text-display-bold font-display-bold text-on-surface transition-colors';
            }
        });

        // Numeric input sync
        numInput.addEventListener('input', (e) => {
            let val = parseFloat(e.target.value) || 0;
            if(val > 10) val = 10;
            if(val < -10) val = -10;
            slider.value = val;
            const formatted = (val > 0 ? '+' : '') + val.toFixed(1);
            displayVal.textContent = formatted;
        });
    </script>
